<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Nieche Reader</title>
    <!-- STABLE pdf.js v2.16.105 legacy build - global pdfjsLib -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Set worker for stable version -->
    <script>
      // Wait for pdf.js to load
      function waitForPdfJs() {
        if (typeof pdfjsLib !== "undefined") {
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
          console.log("PDF.js v2.16.105 worker configured");
          // Load parser now
          const parserScript = document.createElement("script");
          parserScript.src = "parser.js";
          document.head.appendChild(parserScript);
        } else {
          setTimeout(waitForPdfJs, 50);
        }
      }
      waitForPdfJs();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- Google Fonts & Material Symbols -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@400;500&family=Roboto:wght@400;500;700&display=swap"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Nieche Reader</h1>
    </header>

    <!-- Chapter Menu Bar - Full width horizontal scroll -->
    <nav id="drawer-menu" class="drawer-overlay">
      <span class="menu-icon material-symbols-rounded">menu_book</span>
      <ul id="chapter-list" class="chapter-list"></ul>
    </nav>

    <main>
      <!-- Welcome Menu -->
      <section id="welcome-menu" class="welcome-menu">
        <div class="welcome-card">
          <h2>🌟 Start Reading</h2>
          <p>Choose text or PDF for the best speed reading experience</p>
          <div class="menu-buttons">
            <button id="paste-text-btn" class="menu-btn text-btn">
              <span class="material-symbols-rounded">text_fields</span>
              <span>Paste Text</span>
            </button>
            <div class="menu-btn pdf-btn">
              <input
                type="file"
                id="fileInput"
                accept=".pdf"
                style="display: none"
              />
              <label
                for="fileInput"
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: 0.75rem;
                  cursor: pointer;
                  width: 100%;
                  height: 100%;
                "
              >
                <span class="material-symbols-rounded">picture_as_pdf</span>
                <span>Upload PDF</span>
              </label>
            </div>
          </div>
          <div
            id="text-input-section"
            class="text-input-section"
            style="display: none"
          >
            <textarea
              id="text-input"
              placeholder="Paste your text, article, or book content here...&#10;&#10;📖 The quick brown fox jumps over the lazy dog. This speed reader will help you read faster!"
            ></textarea>
            <button id="start-text-btn" class="start-reading-btn">
              🚀 Start Reading
            </button>
          </div>
        </div>
      </section>

      <!-- RSVP Section -->
      <section class="rsvp-container">
        <div id="rsvp-display">Get started with text or PDF!</div>

        <div class="controls">
          <div class="control-row top-row">
            <button
              id="prev-10"
              class="control-btn scrub-btn"
              title="Back 10 words"
            >
              <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <button
              id="play-btn"
              class="control-btn play-pause large-btn"
              title="Play"
            >
              <span class="material-symbols-rounded">play_arrow</span>
            </button>
            <button
              id="pause-btn"
              class="control-btn play-pause large-btn"
              style="display: none"
              title="Pause"
            >
              <span class="material-symbols-rounded">pause</span>
            </button>
            <button id="reset-btn" class="control-btn large-btn" title="Reset">
              <span class="material-symbols-rounded">replay</span>
            </button>
            <button
              id="next-10"
              class="control-btn scrub-btn"
              title="Forward 10 words"
            >
              <span class="material-symbols-rounded">arrow_forward</span>
            </button>
          </div>

          <div class="control-row bottom-row">
            <span id="wpm-display" style="display: none;" class="info-display">300 WPM</span>
            <div class="wpm-button-container">
              <button id="wpm-decrease" class="wpm-btn" title="Decrease WPM">
                -
              </button>
              <span id="wpm-display-settings" class="info-display wpm-inline"
                >300</span
              >
              <button id="wpm-increase" class="wpm-btn" title="Increase WPM">
                +
              </button>
            </div>
            <span id="chapter-eta" class="info-display">Ch: --</span>
            <span id="book-eta" class="info-display">Book: --</span>
            
          </div>
        </div>
      </section>
    </main>

    <!-- App logic -->
    <script type="module" src="script.js"></script>
  </body>
</html>
